# Embedded Derby for isolated tests
spring.datasource.url=jdbc:derby:memory:apiTestDB;create=true
spring.datasource.driver-class-name=org.apache.derby.jdbc.EmbeddedDriver
spring.datasource.username=app
spring.datasource.password=app

# Initialize schema and seed data for tests
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql
spring.sql.init.data-locations=classpath:data-test.sql

# Exclude RocketMQ auto-configuration (replaced by @MockBean in tests)
spring.autoconfigure.exclude=\
  org.apache.rocketmq.spring.autoconfigure.RocketMQAutoConfiguration,\
  org.apache.rocketmq.spring.autoconfigure.RocketMQListenerAutoConfiguration

rocketmq.name-server=localhost:9876
rocketmq.producer.group=test-event-group

# Random port so tests don't conflict
server.port=0
spring.graphql.graphiql.enabled=false

# SQL used by APIRepository (same queries, test table)
app.event.get.sql=SELECT EVENT_ID,EVENT_STATUS,EVENT_SCORE FROM API_EVENT_DETAILS WHERE EVENT_ID = ?
app.event.getalllive.sql=SELECT EVENT_ID,EVENT_STATUS,EVENT_SCORE FROM API_EVENT_DETAILS WHERE EVENT_STATUS = TRUE
app.event.add.sql=INSERT INTO API_EVENT_DETAILS (EVENT_ID,EVENT_STATUS,EVENT_SCORE) VALUES (?,?,?)
app.event.update.sql=UPDATE API_EVENT_DETAILS SET EVENT_STATUS = ?, EVENT_SCORE=? WHERE EVENT_ID = ?
app.event.remove.sql=DELETE FROM API_EVENT_DETAILS WHERE EVENT_ID = ?
