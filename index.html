<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN" "http://www.w3.org/TR/html4/frameset.dtd">
<html>
<head>
<title>Left and Main Frame Layout</title>
</head>
<frameset cols="15%, 85%">
    <!-- The first frame loads the navigation menu -->
    <frame src="deploy/left_frame.html" style="border: 2px solid gray;" name="menu_frame" frameborder="0" noresize scrolling="auto" />
    <!-- The second frame loads the main content, named for targeting links from the left frame -->
    <frame src="deploy/content.html" style="border: 2px solid gray;" name="main_frame" frameborder="0" noresize scrolling="auto" />

    <!-- Fallback content for browsers that do not support frames -->
    <noframes>
        <body >
            <p>Your browser does not support frames. Please use one of the links below:</p>
            <ul>
                <li><a href="content_home.html">Home</a></li>
                <li><a href="content_about.html">About</a></li>
                <li><a href="content_contact.html">Contact</a></li>
            </ul>
        </body>
    </noframes>
</frameset>
</html>
